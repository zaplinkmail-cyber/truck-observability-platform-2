version: '3.8'

services:
  # Jaeger Backend
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "6831:6831/udp"  # Jaeger collector (for OpenTelemetry)
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    networks:
      - observability

  # Truck Service
  truck-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_DIR: services/truck_service
        SERVICE_PORT: 5001
    container_name: truck-service
    ports:
      - "5001:5001"
    environment:
      - JAEGER_AGENT_HOST=jaeger
      - JAEGER_AGENT_PORT=6831
      - SERVICE_NAME=truck_service
      - PYTHONUNBUFFERED=1
    depends_on:
      - jaeger
    networks:
      - observability
    command: python app.py

  # Shipment Service
  shipment-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_DIR: services/shipment_service
        SERVICE_PORT: 5002
    container_name: shipment-service
    ports:
      - "5002:5002"
    environment:
      - JAEGER_AGENT_HOST=jaeger
      - JAEGER_AGENT_PORT=6831
      - SERVICE_NAME=shipment_service
      - PYTHONUNBUFFERED=1
    depends_on:
      - jaeger
      - truck-service
      - driver-service
    networks:
      - observability
    command: python app.py

  # Driver Service
  driver-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_DIR: services/driver_service
        SERVICE_PORT: 5003
    container_name: driver-service
    ports:
      - "5003:5003"
    environment:
      - JAEGER_AGENT_HOST=jaeger
      - JAEGER_AGENT_PORT=6831
      - SERVICE_NAME=driver_service
      - PYTHONUNBUFFERED=1
    depends_on:
      - jaeger
    networks:
      - observability
    command: python app.py

networks:
  observability:
    driver: bridge
