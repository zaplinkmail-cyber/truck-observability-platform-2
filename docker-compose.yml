version: '3.8'

services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP  ← we use this
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - observability

  truck-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_DIR: services/truck_service
        SERVICE_PORT: 5001
    container_name: truck-service
    ports:
      - "5001:5001"
    environment:
      - JAEGER_HOST=jaeger
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - PYTHONUNBUFFERED=1
    depends_on:
      - jaeger
    networks:
      - observability
    command: python app.py

  shipment-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_DIR: services/shipment_service
        SERVICE_PORT: 5002
    container_name: shipment-service
    ports:
      - "5002:5002"
    environment:
      - JAEGER_HOST=jaeger
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - PYTHONUNBUFFERED=1
    depends_on:
      - jaeger
      - truck-service
      - driver-service
    networks:
      - observability
    command: python app.py

  driver-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_DIR: services/driver_service
        SERVICE_PORT: 5003
    container_name: driver-service
    ports:
      - "5003:5003"
    environment:
      - JAEGER_HOST=jaeger
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - PYTHONUNBUFFERED=1
    depends_on:
      - jaeger
    networks:
      - observability
    command: python app.py

networks:
  observability:
    driver: bridge